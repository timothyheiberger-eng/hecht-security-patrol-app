<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Hecht Security Patrol Enterprise v1.0</title>
<style>
:root{--bg:#070d18;--panel:#101827;--line:#2d3b55;--gold:#d7ad2f;--text:#f4f7fb;--muted:#b9c3d3;--green:#22c55e;--red:#ef4444;--ink:#111827}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#070b13,#111827);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--text)}header{display:flex;justify-content:space-between;align-items:center;padding:18px 28px;border-bottom:1px solid var(--line);background:#050914ee;position:sticky;top:0;z-index:2}.brand{display:flex;gap:14px;align-items:center}.seal{width:52px;height:52px;border:3px solid var(--gold);border-radius:50%;display:grid;place-items:center;color:var(--gold);font-weight:900}.brand h1{margin:0;color:var(--gold);font-size:26px}.brand p{margin:3px 0 0;color:var(--muted)}button,.btn{border:0;border-radius:12px;padding:12px 18px;font-weight:800;background:#334155;color:#fff;margin:4px;cursor:pointer}.gold{background:var(--gold);color:#111}.green{background:var(--green);color:#07110a}.red{background:var(--red)}main{padding:22px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.card,.section{background:#111827d8;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 12px 30px #0005}.card h2,.section h2,.section h3{color:var(--gold);margin-top:0}.hidden{display:none!important}label{display:block;margin:10px 0 5px;color:#dbe3ef;font-weight:650}input,select,textarea{width:100%;background:#070d18;border:1px solid #34435f;color:#fff;border-radius:12px;padding:11px;font:inherit}textarea{min-height:92px}.row{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.row4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.checkgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.check{border:1px solid #31405b;border-radius:10px;padding:8px;background:#0b1220}.check input{width:auto;margin-right:8px}.patrol-row{display:grid;grid-template-columns:1fr 2fr 2fr 2fr 2fr;gap:8px;margin:8px 0}.small{font-size:12px;color:var(--muted)}.sig{height:120px;background:#fff;border-radius:12px;touch-action:none;width:100%}.photoThumb{max-width:130px;max-height:90px;border-radius:8px;margin:4px}.loginbox{max-width:430px;margin:60px auto}.count{font-size:40px;color:var(--gold);font-weight:900}.notice{border-left:4px solid var(--gold);padding:12px;background:#07111f;margin:10px 0;color:#dbeafe}.printOnly{display:none}
@media(max-width:900px){.grid{grid-template-columns:1fr}.row,.row3,.row4{grid-template-columns:1fr}.checkgrid{grid-template-columns:1fr 1fr}.patrol-row{grid-template-columns:1fr}.brand h1{font-size:20px}}
@media print{body{background:#fff!important;color:#000!important}header,main>*:not(.printing),.noPrint{display:none!important}.printing{display:block!important;background:#fff!important;color:#000!important;border:0!important;box-shadow:none!important;padding:0!important}.printOnly{display:block!important}.paper{display:block!important;color:#000;background:#fff;font-family:Arial,sans-serif;width:100%;padding:0}.page{page-break-after:always;min-height:9.8in;padding:.35in;border:0}.page:last-child{page-break-after:auto}.phead{display:flex;justify-content:space-between;border-bottom:3px solid #111;padding-bottom:8px;margin-bottom:8px}.pbrand{font-size:18px;font-weight:900}.pgold{color:#98710c}.ptable{width:100%;border-collapse:collapse;font-size:10.5px}.ptable td,.ptable th{border:1px solid #111;padding:4px;vertical-align:top}.box{display:inline-block;width:12px;height:12px;border:1px solid #111;margin-right:4px;text-align:center;line-height:10px}.psection{font-weight:bold;background:#eee;text-transform:uppercase}.pnarr{min-height:120px;white-space:pre-wrap}.psig{height:70px;border:1px solid #111}.pfoot{position:fixed;bottom:.18in;left:.35in;right:.35in;font-size:9px;color:#555;border-top:1px solid #999;padding-top:3px}.appScreen,.modal{display:none!important}@page{size:letter portrait;margin:.25in}}
</style></head><body><header><div class="brand"><div class="seal">HS</div><div><h1>HECHT SECURITY PATROL</h1><p>Enterprise Secure iPad Command Center v1.0</p></div></div><div><button onclick="show('dash')">Dashboard</button><button onclick="lock()">Lock</button></div></header><main>
<div id="login" class="loginbox card"><h2>Secure Login</h2><p class="small">Create a password the first time you use this app. Reports are stored on this iPad/browser.</p><input id="pw" type="password" placeholder="Password"><button class="gold" onclick="login()">Unlock</button><p id="loginMsg" class="small"></p></div>
<div id="dash" class="hidden appScreen"><div class="grid"><div class="card"><h2>Shift Command</h2><div id="savedCount" class="count">0</div><p>Encrypted reports on this iPad</p><button class="gold" onclick="newDAR()">New DAR</button><button onclick="newIncident()">New Incident</button></div><div class="card"><h2>Quick Forms</h2><button class="gold" onclick="quick('Vehicle / Tow')">Vehicle / Tow</button><button class="gold" onclick="quick('Lights Out / Maintenance')">Lights Out / Maintenance</button><button class="gold" onclick="quick('Trespass Warning')">Trespass Warning</button><button class="gold" onclick="quick('Traffic Warning')">Traffic Warning</button></div><div class="card"><h2>Saved Reports</h2><button onclick="viewReports()">View / Search Reports</button><button onclick="exportBackup()">Export Encrypted Backup</button><button class="gold" onclick="importBackup()">Import Backup</button><input id="importFile" type="file" class="hidden" onchange="handleImport(event)"></div><div class="card"><h2>Setup</h2><label>Default Property</label><input id="setupProperty" value="Parkside Apartments | 3214 Valley Bluff Drive, Atlanta, GA"><label>Default Officer</label><input id="setupOfficer" value="Timothy Heiberger"><label>Auto-lock Minutes</label><input id="setupLock" type="number" value="10"><button class="green" onclick="saveSetup()">Save Setup</button></div></div></div>
<div id="form" class="hidden appScreen section"><h2 id="formTitle">Report</h2><div id="formBody"></div><div class="noPrint"><button class="green" onclick="saveCurrent()">Save Encrypted Report</button><button class="gold" onclick="printCurrent()">Print / Save PDF</button><button onclick="show('dash')">Back</button></div></div>
<div id="reports" class="hidden appScreen section"><h2>Saved Reports</h2><input id="search" placeholder="Search reports" oninput="renderReports()"><div id="reportList"></div><button onclick="show('dash')">Back</button></div>
</main><script>
let state={unlocked:false,key:null,current:null,photos:[],sigData:''}; const LS='hecht_secure_reports_v1', SET='hecht_setup_v1', VER='hecht_pw_v1';
function show(id){['login','dash','form','reports'].forEach(x=>document.getElementById(x).classList.add('hidden'));document.getElementById(id).classList.remove('hidden');touch()}function touch(){localStorage.lastTouch=Date.now()}setInterval(()=>{let m=+(JSON.parse(localStorage.getItem(SET)||'{}').lock||10);if(state.unlocked&&Date.now()-(+localStorage.lastTouch||0)>m*60000)lock()},30000);document.addEventListener('click',touch);document.addEventListener('input',touch);
async function digest(s){let b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('')}async function getKey(p){let mat=await crypto.subtle.importKey('raw',new TextEncoder().encode(p),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:new TextEncoder().encode('hecht-v1-salt'),iterations:120000,hash:'SHA-256'},mat,{name:'AES-GCM',length:256},false,['encrypt','decrypt'])}
async function enc(obj){let iv=crypto.getRandomValues(new Uint8Array(12));let ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},state.key,new TextEncoder().encode(JSON.stringify(obj)));return {iv:btoa(String.fromCharCode(...iv)),ct:btoa(String.fromCharCode(...new Uint8Array(ct)))}}async function dec(pack){let iv=Uint8Array.from(atob(pack.iv),c=>c.charCodeAt(0));let ct=Uint8Array.from(atob(pack.ct),c=>c.charCodeAt(0));let pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},state.key,ct);return JSON.parse(new TextDecoder().decode(pt))}
async function login(){let p=document.getElementById('pw').value;if(!p)return;let h=await digest(p);let saved=localStorage.getItem(VER);if(!saved){localStorage.setItem(VER,h);document.getElementById('loginMsg').textContent='Password created.'}else if(saved!==h){document.getElementById('loginMsg').textContent='Wrong password.';return}state.key=await getKey(p);state.unlocked=true;loadSetup();await updateCount();show('dash')}function lock(){state={unlocked:false,key:null,current:null,photos:[],sigData:''};document.getElementById('pw').value='';show('login')}
function loadSetup(){let s=JSON.parse(localStorage.getItem(SET)||'{}');if(s.property)setupProperty.value=s.property;if(s.officer)setupOfficer.value=s.officer;if(s.lock)setupLock.value=s.lock}function saveSetup(){localStorage.setItem(SET,JSON.stringify({property:setupProperty.value,officer:setupOfficer.value,lock:setupLock.value}));alert('Setup saved')}function setup(){return JSON.parse(localStorage.getItem(SET)||'{}')}
async function allReports(){let packs=JSON.parse(localStorage.getItem(LS)||'[]');let out=[];for(let p of packs){try{out.push(await dec(p))}catch(e){}}return out}async function saveReport(r){let packs=JSON.parse(localStorage.getItem(LS)||'[]');packs=packs.filter(x=>x.id!==r.id);let e=await enc(r);e.id=r.id;packs.push(e);localStorage.setItem(LS,JSON.stringify(packs));await updateCount()}async function updateCount(){let a=await allReports();savedCount.textContent=a.length}
function gid(){return Date.now().toString(36).toUpperCase()}function reportNo(prefix){return prefix+'-'+Math.floor(100000+Math.random()*899999)}
function newDAR(){let s=setup();state.current={id:gid(),type:'DAR',reportNo:reportNo('DAR'),date:new Date().toISOString().slice(0,10),time:new Date().toLocaleTimeString(),property:s.property||'',officer:s.officer||'',checks:{},maint:{},actions:{},patrol:Array.from({length:14},()=>({})),photos:[]};renderDAR()}function newIncident(){let s=setup();state.current={id:gid(),type:'Incident',reportNo:reportNo('IR'),date:new Date().toISOString().slice(0,10),time:new Date().toLocaleTimeString(),property:s.property||'',officer:s.officer||'',checks:{},response:{},evidence:{},actions:{},photos:[]};renderIncident()}function quick(t){newIncident();state.current.subtype=t;document.getElementById('subtype').value=t}
const incidentChecks=['Suspicious Person','Suspicious Vehicle','Trespassing','Loitering/Prowling','Illegal Dumping','Loud Music/Party','Domestic Fight','Burglary/Theft','Vandalism','Parking Violation','Speeding Vehicles','Abandoned Vehicle','Open Door / Unsecured Area','Fire / Safety Hazard','Animal Complaint','Maintenance Issue','Broken Lights','Pool Violation','Other'];
function cb(name,obj='checks'){let id=obj+'_'+name.replace(/\W/g,'_');return `<label class="check"><input type="checkbox" id="${id}">${name}</label>`}
function patrolRows(){let h='<div class="patrol-row small"><b>Time</b><b>Location</b><b>Activity</b><b>Status / Action</b><b>Notes</b></div>';for(let i=0;i<14;i++)h+=`<div class="patrol-row"><input id="p${i}time" placeholder="Time"><input id="p${i}loc" placeholder="Location"><input id="p${i}act" placeholder="Activity"><input id="p${i}status" placeholder="Status / Action"><input id="p${i}notes" placeholder="Notes"></div>`;return h}
function commonMedia(){return `<h3>Photos</h3><input type="file" accept="image/*" multiple onchange="photos(event)"><div id="photoBox"></div><h3>Officer Signature</h3><canvas id="sig" class="sig"></canvas><button onclick="clearSig()">Clear Signature</button>`}
function renderDAR(){formTitle.textContent='Daily Activity Report';formBody.innerHTML=`<div class="row3"><div><label>Report #</label><input id="reportNo" value="${state.current.reportNo}"></div><div><label>Date</label><input id="date" type="date" value="${state.current.date}"></div><div><label>Time</label><input id="time" value="${state.current.time}"></div></div><label>Property</label><input id="property" value="${state.current.property}"><div class="row3"><div><label>Officer</label><input id="officer" value="${state.current.officer}"></div><div><label>Shift</label><select id="shift"><option>Day</option><option>Evening</option><option>Night</option></select></div><div><label>Weather</label><input id="weather"></div></div><h3>Patrol Log - Record Observations Throughout Shift</h3>${patrolRows()}<h3>Incident / Activity Checklist</h3><div class="checkgrid">${incidentChecks.map(x=>cb(x)).join('')}</div><h3>Incident Details / Narrative</h3><textarea id="narrative" placeholder="Include names, apartment numbers, descriptions, vehicle tags, exact locations, and action taken. Use objective facts only."></textarea><h3>Vehicle Information</h3><div class="row4"><input id="vehMake" placeholder="Make / Model"><input id="vehColor" placeholder="Color"><input id="vehTag" placeholder="Tag #"><input id="vehState" placeholder="State"></div><div class="row"><input id="vehLoc" placeholder="Location Found"><select id="tow"><option>Tow Requested: No</option><option>Tow Requested: Yes</option></select></div><h3>Person(s) Involved</h3><div class="row3"><input id="personName" placeholder="Name"><input id="personApt" placeholder="Apt / Unit #"><select id="idReq"><option>ID Requested: No</option><option>ID Requested: Yes</option></select></div><textarea id="personDesc" placeholder="Description / clothing / direction of travel"></textarea><h3>Maintenance / Safety Issues Observed</h3><div class="checkgrid">${['Lights Out','Damaged Property','Water Leak','Broken Lock/Door','Gate Issue','Trip Hazard','Trash Area Issue','Other'].map(x=>cb(x,'maint')).join('')}</div><textarea id="maintDetails" placeholder="Details / location"></textarea><h3>Actions Taken</h3><div class="checkgrid">${['Verbal Warning','Incident Report Completed','Police Called','EMS Called','Tow Company Contacted','Management Notified','Resident Contacted','Area Cleared'].map(x=>cb(x,'actions')).join('')}</div><textarea id="actionDetails" placeholder="Action details"></textarea><div class="row"><select id="follow"><option>Follow-up Required: No</option><option>Follow-up Required: Yes</option></select><input id="followDetails" placeholder="Follow-up details"></div><h3>Officer Completion / Client Summary</h3><div class="row3"><input id="completed" placeholder="Time Completed"><select id="emailSent"><option>Email Sent: No</option><option>Email Sent: Yes</option></select><input id="emailBy" placeholder="Email Sent By"></div><select id="propertyStatus"><option>Quiet / Routine</option><option>Issues Observed</option><option>Police / EMS Contact</option><option>Management Follow-up Needed</option></select><textarea id="execSummary" placeholder="Executive summary"></textarea><h3>Management / Supervisor Review</h3><div class="row3"><input id="reviewedBy" placeholder="Reviewed By"><input id="reviewDate" type="date"><select id="closed"><option>Follow-up Closed: No</option><option>Follow-up Closed: Yes</option></select></div><textarea id="reviewNotes" placeholder="Review notes"></textarea>${commonMedia()}`;show('form');initSig()}
function renderIncident(){formTitle.textContent='Incident Report';formBody.innerHTML=`<div class="row3"><div><label>Incident #</label><input id="reportNo" value="${state.current.reportNo}"></div><div><label>Date</label><input id="date" type="date" value="${state.current.date}"></div><div><label>Time</label><input id="time" value="${state.current.time}"></div></div><label>Property</label><input id="property" value="${state.current.property}"><div class="row3"><input id="officer" value="${state.current.officer}" placeholder="Officer"><input id="subtype" placeholder="Report / Incident Type"><input id="location" placeholder="Exact Location / Building / Unit"></div><h3>Incident Classification</h3><div class="checkgrid">${incidentChecks.map(x=>cb(x)).join('')}</div><h3>Response / Notifications</h3><div class="checkgrid">${['Police Notified','Police Responded','Fire Notified','EMS Notified','Management Notified','Resident Contacted','Tow Company Contacted','Area Secured','Report Completed'].map(x=>cb(x,'response')).join('')}</div><h3>Persons Involved</h3><div class="row3"><input id="victim" placeholder="Victim / Reporting Party"><input id="witness" placeholder="Witness"><input id="suspect" placeholder="Suspect / Subject"></div><textarea id="descriptions" placeholder="Descriptions, clothing, direction of travel, apartment numbers, statements"></textarea><h3>Vehicle Information</h3><div class="row4"><input id="vehMake" placeholder="Make / Model"><input id="vehColor" placeholder="Color"><input id="vehTag" placeholder="Tag #"><input id="vehState" placeholder="State"></div><input id="vehLoc" placeholder="Vehicle location / direction of travel"><h3>Evidence / Documentation</h3><div class="checkgrid">${['Photos Taken','Video Available','Physical Evidence','Witness Statement','Police Case Number','Property Damage','Medical Attention','Other'].map(x=>cb(x,'evidence')).join('')}</div><div class="row"><input id="caseNo" placeholder="Police case #"><input id="damage" placeholder="Damage / loss estimate"></div><h3>Incident Narrative</h3><textarea id="narrative" placeholder="State objective facts only. Who, what, when, where, actions taken, and final disposition."></textarea><h3>Actions Taken</h3><div class="checkgrid">${['Verbal Warning','Subject Left Property','Criminal Trespass Warning','Police Called','EMS Called','Management Notified','Resident Advised','Area Cleared','Follow-up Required'].map(x=>cb(x,'actions')).join('')}</div><textarea id="actionDetails" placeholder="Action details / disposition"></textarea><h3>Supervisor Review</h3><div class="row3"><input id="reviewedBy" placeholder="Reviewed By"><input id="reviewDate" type="date"><select id="closed"><option>Closed: No</option><option>Closed: Yes</option></select></div><textarea id="reviewNotes" placeholder="Review notes"></textarea>${commonMedia()}`;show('form');initSig()}
function collect(){let r=state.current;r.reportNo=val('reportNo');r.date=val('date');r.time=val('time');r.property=val('property');r.officer=val('officer');r.shift=val('shift');r.weather=val('weather');r.narrative=val('narrative');r.location=val('location');r.subtype=val('subtype');r.vehicle={make:val('vehMake'),color:val('vehColor'),tag:val('vehTag'),state:val('vehState'),loc:val('vehLoc'),tow:val('tow')};r.person={name:val('personName'),apt:val('personApt'),idReq:val('idReq'),desc:val('personDesc'),victim:val('victim'),witness:val('witness'),suspect:val('suspect'),descriptions:val('descriptions')};r.details={maintDetails:val('maintDetails'),actionDetails:val('actionDetails'),follow:val('follow'),followDetails:val('followDetails'),completed:val('completed'),emailSent:val('emailSent'),emailBy:val('emailBy'),propertyStatus:val('propertyStatus'),execSummary:val('execSummary'),reviewedBy:val('reviewedBy'),reviewDate:val('reviewDate'),closed:val('closed'),reviewNotes:val('reviewNotes'),caseNo:val('caseNo'),damage:val('damage')};['checks','maint','actions','response','evidence'].forEach(o=>{r[o]={};document.querySelectorAll(`[id^=${o}_]`).forEach(el=>r[o][el.id.replace(o+'_','').replaceAll('_',' ')]=el.checked)});r.patrol=[];for(let i=0;i<14;i++)r.patrol.push({time:val('p'+i+'time'),loc:val('p'+i+'loc'),act:val('p'+i+'act'),status:val('p'+i+'status'),notes:val('p'+i+'notes')});let c=document.getElementById('sig');r.sig=c?c.toDataURL():state.sigData;r.photos=state.photos||[];return r}function val(id){let e=document.getElementById(id);return e?e.value:''}
async function saveCurrent(){let r=collect();await saveReport(r);alert('Encrypted report saved.')}function mark(obj,k){return obj&&obj[k]?'X':''}function cbPrint(obj,k){return `<span class="box">${mark(obj,k)}</span>${k}`}
function header(r,title){return `<div class="phead"><div><div class="pbrand"><span class="pgold">HS</span> HECHT SECURITY PATROL</div><div>Professional Apartment Community Patrol and Reporting</div><div>${r.property||''}</div></div><div><b>${title}</b><br>${r.reportNo||''}<br>${r.date||''} ${r.time||''}</div></div>`}
function printDAR(r){let checks=incidentChecks.map(x=>cbPrint(r.checks,x)).join('<br>');let maint=['Lights Out','Damaged Property','Water Leak','Broken Lock/Door','Gate Issue','Trip Hazard','Trash Area Issue','Other'].map(x=>cbPrint(r.maint,x)).join('<br>');let actions=['Verbal Warning','Incident Report Completed','Police Called','EMS Called','Tow Company Contacted','Management Notified','Resident Contacted','Area Cleared'].map(x=>cbPrint(r.actions,x)).join('<br>');let rows=(r.patrol||[]).map(p=>`<tr><td>${p.time||''}</td><td>${p.loc||''}</td><td>${p.act||''}</td><td>${p.status||''}</td><td>${p.notes||''}</td></tr>`).join('');return `<div class="paper printing"><div class="page">${header(r,'DAILY ACTIVITY REPORT')}<table class="ptable"><tr><td><b>Property</b><br>${r.property||''}</td><td><b>Report Date</b><br>${r.date||''}</td><td><b>Shift</b><br>${r.shift||''}</td><td><b>Officer</b><br>${r.officer||''}</td><td><b>Weather</b><br>${r.weather||''}</td></tr><tr><th colspan="5" class="psection">Patrol Log</th></tr><tr><th>Time</th><th>Location</th><th>Activity</th><th>Status / Action</th><th>Notes</th></tr>${rows}</table></div><div class="page">${header(r,'DAILY ACTIVITY REPORT - PAGE 2')}<table class="ptable"><tr><td width="35%"><b>Incident / Activity Checklist</b><br>${checks}</td><td colspan="2"><b>Incident Details / Narrative</b><div class="pnarr">${r.narrative||''}</div></td></tr><tr><td colspan="3" class="psection">Vehicle Information</td></tr><tr><td>Make/Model<br>${r.vehicle?.make||''}</td><td>Color / Tag / State<br>${r.vehicle?.color||''} ${r.vehicle?.tag||''} ${r.vehicle?.state||''}</td><td>Location / Tow<br>${r.vehicle?.loc||''} ${r.vehicle?.tow||''}</td></tr><tr><td colspan="3" class="psection">Persons Involved</td></tr><tr><td>Name<br>${r.person?.name||''}</td><td>Apt / ID<br>${r.person?.apt||''} ${r.person?.idReq||''}</td><td>Description<br>${r.person?.desc||''}</td></tr><tr><td><b>Maintenance / Safety Issues</b><br>${maint}</td><td colspan="2"><b>Details / Location</b><br>${r.details?.maintDetails||''}</td></tr></table></div><div class="page">${header(r,'DAILY ACTIVITY REPORT - PAGE 3')}<table class="ptable"><tr><td width="35%"><b>Actions Taken</b><br>${actions}</td><td><b>Action Details</b><div class="pnarr">${r.details?.actionDetails||''}</div></td></tr><tr><td>Follow-up<br>${r.details?.follow||''}</td><td>${r.details?.followDetails||''}</td></tr><tr><td>Officer Completion<br>${r.details?.completed||''}<br>${r.details?.emailSent||''}<br>${r.details?.emailBy||''}</td><td>Client-Ready Shift Summary<br>${r.details?.propertyStatus||''}<br>${r.details?.execSummary||''}</td></tr><tr><td>Officer Signature</td><td><img src="${r.sig||''}" style="max-height:80px"></td></tr><tr><td>Reviewed By<br>${r.details?.reviewedBy||''}<br>${r.details?.reviewDate||''}</td><td>Review Notes<br>${r.details?.reviewNotes||''}</td></tr></table></div></div>`}
function printIncident(r){let checks=incidentChecks.map(x=>cbPrint(r.checks,x)).join('<br>');let response=['Police Notified','Police Responded','Fire Notified','EMS Notified','Management Notified','Resident Contacted','Tow Company Contacted','Area Secured','Report Completed'].map(x=>cbPrint(r.response,x)).join('<br>');let evidence=['Photos Taken','Video Available','Physical Evidence','Witness Statement','Police Case Number','Property Damage','Medical Attention','Other'].map(x=>cbPrint(r.evidence,x)).join('<br>');let actions=['Verbal Warning','Subject Left Property','Criminal Trespass Warning','Police Called','EMS Called','Management Notified','Resident Advised','Area Cleared','Follow-up Required'].map(x=>cbPrint(r.actions,x)).join('<br>');return `<div class="paper printing"><div class="page">${header(r,'INCIDENT REPORT')}<table class="ptable"><tr><td>Incident #<br>${r.reportNo||''}</td><td>Date / Time<br>${r.date||''} ${r.time||''}</td><td>Officer<br>${r.officer||''}</td></tr><tr><td>Property<br>${r.property||''}</td><td>Location / Building / Unit<br>${r.location||''}</td><td>Type<br>${r.subtype||''}</td></tr><tr><td width="35%"><b>Incident Classification</b><br>${checks}</td><td colspan="2"><b>Response / Notifications</b><br>${response}</td></tr><tr><td colspan="3" class="psection">Persons Involved</td></tr><tr><td>Victim / Reporting Party<br>${r.person?.victim||''}</td><td>Witness<br>${r.person?.witness||''}</td><td>Suspect / Subject<br>${r.person?.suspect||''}</td></tr><tr><td colspan="3">Descriptions / Statements<br>${r.person?.descriptions||''}</td></tr></table></div><div class="page">${header(r,'INCIDENT REPORT - PAGE 2')}<table class="ptable"><tr><td colspan="3" class="psection">Vehicle Information</td></tr><tr><td>Make/Model<br>${r.vehicle?.make||''}</td><td>Color / Tag / State<br>${r.vehicle?.color||''} ${r.vehicle?.tag||''} ${r.vehicle?.state||''}</td><td>Location<br>${r.vehicle?.loc||''}</td></tr><tr><td><b>Evidence / Documentation</b><br>${evidence}</td><td>Case #<br>${r.details?.caseNo||''}</td><td>Damage / Loss<br>${r.details?.damage||''}</td></tr><tr><td colspan="3" class="psection">Incident Narrative</td></tr><tr><td colspan="3"><div class="pnarr">${r.narrative||''}</div></td></tr><tr><td width="35%"><b>Actions Taken</b><br>${actions}</td><td colspan="2"><b>Action Details / Disposition</b><br>${r.details?.actionDetails||''}</td></tr><tr><td>Officer Signature</td><td colspan="2"><img src="${r.sig||''}" style="max-height:80px"></td></tr><tr><td>Reviewed By<br>${r.details?.reviewedBy||''}</td><td>Date / Closed<br>${r.details?.reviewDate||''} ${r.details?.closed||''}</td><td>Review Notes<br>${r.details?.reviewNotes||''}</td></tr></table></div></div>`}
function printCurrent(){let r=collect();let old=document.querySelector('.printing');if(old)old.remove();let wrap=document.createElement('div');wrap.innerHTML=r.type==='DAR'?printDAR(r):printIncident(r);document.body.appendChild(wrap.firstChild);setTimeout(()=>window.print(),200)}
async function viewReports(){await renderReports();show('reports')}async function renderReports(){let q=(search?.value||'').toLowerCase();let a=await allReports();reportList.innerHTML=a.filter(r=>JSON.stringify(r).toLowerCase().includes(q)).map(r=>`<div class="card"><b>${r.type} ${r.reportNo}</b><br>${r.date} ${r.property||''}<br><button onclick="openReport('${r.id}')">Open</button></div>`).join('')||'<p>No reports found.</p>'}async function openReport(id){let a=await allReports();state.current=a.find(x=>x.id===id);state.photos=state.current.photos||[];state.current.type==='DAR'?renderDAR():renderIncident()}
async function exportBackup(){let blob=new Blob([localStorage.getItem(LS)||'[]'],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='hecht-encrypted-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click()}function importBackup(){importFile.click()}function handleImport(e){let f=e.target.files[0];let r=new FileReader();r.onload=()=>{localStorage.setItem(LS,r.result);alert('Backup imported');updateCount()};r.readAsText(f)}
function photos(e){state.photos=[];for(let f of e.target.files){let r=new FileReader();r.onload=ev=>{state.photos.push(ev.target.result);photoBox.innerHTML+=`<img class="photoThumb" src="${ev.target.result}">`};r.readAsDataURL(f)}}
function initSig(){
  const c=document.getElementById('sig');
  if(!c) return;
  const ctx=c.getContext('2d');
  c.style.touchAction='none';
  c.style.webkitUserSelect='none';
  c.style.userSelect='none';
  c.style.webkitTouchCallout='none';
  function resizeCanvas(){
    const r=c.getBoundingClientRect();
    const dpr=window.devicePixelRatio||1;
    const old=c.toDataURL && c.width ? c.toDataURL() : null;
    c.width=Math.max(1,Math.round(r.width*dpr));
    c.height=Math.max(1,Math.round(r.height*dpr));
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.lineWidth=3.5;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.strokeStyle='#111827';
    if(old){let img=new Image();img.onload=()=>ctx.drawImage(img,0,0,r.width,r.height);img.src=old;}
  }
  resizeCanvas();
  let drawing=false,last=null;
  function point(e){
    const r=c.getBoundingClientRect();
    const p=(e.touches&&e.touches[0])||(e.changedTouches&&e.changedTouches[0])||e;
    return {x:p.clientX-r.left,y:p.clientY-r.top};
  }
  function start(e){
    if(e.cancelable) e.preventDefault();
    drawing=true; last=point(e);
    if(c.setPointerCapture && e.pointerId!==undefined){try{c.setPointerCapture(e.pointerId)}catch(err){}}
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(last.x+0.1,last.y+0.1); ctx.stroke();
  }
  function move(e){
    if(!drawing) return;
    if(e.cancelable) e.preventDefault();
    const p=point(e);
    ctx.beginPath(); ctx.moveTo(last.x,last.y); ctx.lineTo(p.x,p.y); ctx.stroke(); last=p;
  }
  function end(e){
    if(e && e.cancelable) e.preventDefault();
    drawing=false; last=null;
    if(e && c.releasePointerCapture && e.pointerId!==undefined){try{c.releasePointerCapture(e.pointerId)}catch(err){}}
  }
  c.addEventListener('pointerdown',start,{passive:false});
  c.addEventListener('pointermove',move,{passive:false});
  c.addEventListener('pointerup',end,{passive:false});
  c.addEventListener('pointercancel',end,{passive:false});
  c.addEventListener('touchstart',start,{passive:false});
  c.addEventListener('touchmove',move,{passive:false});
  c.addEventListener('touchend',end,{passive:false});
  c.addEventListener('mousedown',start);
  c.addEventListener('mousemove',move);
  window.addEventListener('mouseup',end);
}
function clearSig(){let c=document.getElementById('sig');if(!c)return;c.getContext('2d').clearRect(0,0,c.width,c.height)}
show('login');
